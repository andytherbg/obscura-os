<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obscura OS Eepsite</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #111417;
      color: #f4f7f8;
    }
    main {
      width: min(720px, calc(100vw - 40px));
    }
    h1 {
      font-size: clamp(2rem, 8vw, 4.5rem);
      margin: 0 0 1rem;
      letter-spacing: 0;
    }
    p {
      color: #b7c8cf;
      font-size: 1.125rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Obscura OS</h1>
    <p>This eepsite is hosted locally and published through I2P. Replace this page with your own site in <code>/var/www/eepsite</code>.</p>
  </main>
</body>
</html>
