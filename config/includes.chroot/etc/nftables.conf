#!/usr/sbin/nft -f

flush ruleset

table inet obscura {
  chain input {
    type filter hook input priority 0; policy drop;

    iif "lo" accept
    ct state established,related accept

    udp sport 67 udp dport 68 accept
    ip protocol icmp limit rate 5/second accept
    ip6 nexthdr ipv6-icmp drop
  }

  chain forward {
    type filter hook forward priority 0; policy drop;
  }

  chain output {
    type filter hook output priority 0; policy drop;

    oif "lo" accept
    ct state established,related accept

    udp sport 68 udp dport 67 accept

    # The I2P router needs underlay access to participate in the network.
    meta skuid "i2psvc" tcp accept
    meta skuid "i2psvc" udp accept

    # No direct DNS or multicast leakage from user applications.
    udp dport 53 drop
    tcp dport 53 drop
    ip daddr 224.0.0.0/4 drop
    ip6 daddr ff00::/8 drop
  }
}

