name: Build Obscura OS ISO

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build desktop ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            debian-archive-keyring \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools

      - name: Build ISO
        run: sudo ./scripts/build-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: obscura-os-desktop-amd64
          path: |
            obscura-os-desktop-amd64.iso
            obscura-os-desktop-amd64.iso.sha256
            obscura-build.log
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            obscura-os-desktop-amd64.iso
            obscura-os-desktop-amd64.iso.sha256
          body: |
            Developer preview of Obscura OS.

            This image is intended for testing and review. Do not rely on it for high-risk anonymity until the firewall, browser profile, and install path have been independently audited.
